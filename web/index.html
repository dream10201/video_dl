<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video DL</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #1f2428;
      --muted: #66707a;
      --line: #d9ded8;
      --accent: #0f766e;
      --accent-text: #ffffff;
      --danger: #b42318;
      --ok: #287d3c;
      --warn: #9a6700;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101415;
        --panel: #171c1f;
        --text: #e8ecef;
        --muted: #9aa4ae;
        --line: #2b3337;
        --accent: #2dd4bf;
        --accent-text: #062220;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }
    .subtle { color: var(--muted); }
    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 18px;
    }
    input, textarea, button {
      height: 42px;
      border-radius: 6px;
      font: inherit;
    }
    input, textarea {
      min-width: 0;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }
    textarea {
      grid-column: 1 / -1;
      width: 100%;
      min-height: 138px;
      height: auto;
      padding: 10px 12px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    .check {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      white-space: nowrap;
      padding: 0 4px;
    }
    .check input {
      width: 18px;
      height: 18px;
      min-width: 18px;
      padding: 0;
      accent-color: var(--accent);
    }
    button {
      border: 0;
      background: var(--accent);
      color: var(--accent-text);
      padding: 0 16px;
      cursor: pointer;
      font-weight: 650;
      white-space: nowrap;
    }
    button.secondary {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }
    button.danger { color: var(--danger); }
    button:disabled { opacity: .55; cursor: default; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
    }
    .toolbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .task {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .task-top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }
    .select-box {
      width: 18px;
      height: 18px;
      margin: 4px 0 0;
      accent-color: var(--accent);
    }
    .url {
      overflow-wrap: anywhere;
      font-weight: 650;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .queued { color: var(--warn); }
    .running { color: var(--accent); }
    .succeeded { color: var(--ok); }
    .failed, .canceled { color: var(--danger); }
    .progress {
      height: 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--line), transparent 35%);
      overflow: hidden;
    }
    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .bar {
      height: 100%;
      width: 0;
      background: var(--accent);
      transition: width .2s ease;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 650;
    }
    .actions a,
    .actions button {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 13px;
      line-height: 1;
    }
    .actions a {
      border: 1px solid var(--line);
      color: var(--text);
      background: transparent;
    }
    pre {
      margin: 0;
      max-height: 150px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      header, .toolbar, .task-top { grid-template-columns: 1fr; display: grid; align-items: stretch; }
      form { grid-template-columns: 1fr; }
      .actions { justify-content: start; }
      .toolbar-actions { justify-content: start; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Video DL</h1>
        <div class="subtle">yt-dlp 下载任务</div>
      </div>
      <button class="secondary" id="refresh" type="button">刷新</button>
    </header>

    <form id="create-form">
      <input id="url" name="url" type="url" required placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
      <label class="check"><input id="proxy" name="proxy" type="checkbox">使用代理</label>
      <button type="submit">新建下载</button>
      <textarea id="raw-headers" name="raw_headers" spellcheck="false" placeholder="可选：粘贴浏览器 Copy request headers，例如 Cookie、User-Agent、Referer、Accept-Language"></textarea>
    </form>

    <div class="toolbar">
      <strong>任务列表</strong>
      <div class="toolbar-actions">
        <span id="summary" class="subtle"></span>
        <button class="secondary" id="select-all" type="button">全选</button>
        <button class="secondary danger" id="delete-selected" type="button">删除选中</button>
        <button class="secondary danger" id="delete-all" type="button">全部删除</button>
      </div>
    </div>
    <section id="tasks" class="list"></section>
  </main>

  <script>
    const list = document.querySelector("#tasks");
    const summary = document.querySelector("#summary");
    const form = document.querySelector("#create-form");
    const input = document.querySelector("#url");
    const proxy = document.querySelector("#proxy");
    const rawHeaders = document.querySelector("#raw-headers");
    const refresh = document.querySelector("#refresh");
    const selectAll = document.querySelector("#select-all");
    const deleteSelected = document.querySelector("#delete-selected");
    const deleteAll = document.querySelector("#delete-all");
    const selected = new Set();
    let currentTasks = [];
    rawHeaders.value = localStorage.getItem("video_dl_raw_headers") || "";

    const labels = {
      queued: "排队中",
      running: "下载中",
      succeeded: "已完成",
      failed: "失败",
      canceled: "已取消"
    };

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = input.value.trim();
      if (!url) return;
      const headerText = rawHeaders.value.trim();
      localStorage.setItem("video_dl_raw_headers", headerText);
      const button = form.querySelector("button");
      button.disabled = true;
      try {
        const res = await fetch("/ui/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, proxy: proxy.checked, raw_headers: headerText })
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || "创建任务失败");
        }
        input.value = "";
        await loadTasks();
      } catch (error) {
        alert(error.message);
      } finally {
        button.disabled = false;
      }
    });

    refresh.addEventListener("click", loadTasks);
    selectAll.addEventListener("click", () => {
      const selectable = currentTasks.map((task) => task.id);
      const allSelected = selectable.length > 0 && selectable.every((id) => selected.has(id));
      selected.clear();
      if (!allSelected) {
        for (const id of selectable) selected.add(id);
      }
      render(currentTasks);
    });
    deleteSelected.addEventListener("click", async () => {
      const ids = [...selected];
      if (!ids.length) return;
      if (!confirm(`删除选中的 ${ids.length} 条任务记录？运行中的任务会被取消。`)) return;
      await Promise.all(ids.map((id) => deleteTask(id)));
      selected.clear();
      await loadTasks();
    });
    deleteAll.addEventListener("click", async () => {
      if (!currentTasks.length) return;
      if (!confirm("删除全部任务记录？运行中的任务会被取消。")) return;
      await fetch("/ui/tasks", { method: "DELETE" });
      selected.clear();
      await loadTasks();
    });

    async function cancelTask(id) {
      await fetch(`/ui/tasks/${id}/cancel`, { method: "POST" });
      await loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`/ui/tasks/${id}`, { method: "DELETE" });
    }

    async function loadTasks() {
      const res = await fetch("/ui/tasks");
      const body = await res.json();
      render(body.tasks || []);
    }

    function render(tasks) {
      currentTasks = tasks;
      const liveIds = new Set(tasks.map((task) => task.id));
      for (const id of [...selected]) {
        if (!liveIds.has(id)) selected.delete(id);
      }
      summary.textContent = tasks.length ? `${tasks.length} 个任务，已选 ${selected.size}` : "";
      selectAll.disabled = tasks.length === 0;
      deleteSelected.disabled = selected.size === 0;
      deleteAll.disabled = tasks.length === 0;
      const allSelected = tasks.length > 0 && tasks.every((task) => selected.has(task.id));
      selectAll.textContent = allSelected ? "取消全选" : "全选";
      if (!tasks.length) {
        list.innerHTML = `<div class="empty">暂无任务</div>`;
        return;
      }
      list.innerHTML = "";
      for (const task of tasks) {
        const el = document.createElement("article");
        el.className = "task";
        const progress = Math.max(0, Math.min(100, task.progress || 0));
        const downloadable = task.file_path && task.status === "succeeded";
        const fileName = task.file_path ? task.file_path.split(/[\\/]/).pop() : "";
        el.innerHTML = `
          <div class="task-top">
            <input class="select-box" type="checkbox" data-select="${task.id}" ${selected.has(task.id) ? "checked" : ""} aria-label="选择任务">
            <div>
              <div class="url">${escapeHTML(task.url)}</div>
              <div class="meta">
                <span>${formatTime(task.created_at)}</span>
                ${task.use_proxy ? `<span>代理</span>` : ""}
                ${task.error ? `<span class="failed">${escapeHTML(task.error)}</span>` : ""}
              </div>
            </div>
            <span class="badge ${task.status}">${labels[task.status] || task.status}</span>
          </div>
          <div class="progress-head">
            <span>${progressLabel(task.status)}</span>
            <span>${progress.toFixed(1)}%</span>
          </div>
          <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${progress.toFixed(1)}">
            <div class="bar" style="width: ${progress}%"></div>
          </div>
          <div class="actions">
            ${downloadable ? `<a href="/downloads/${encodeURIComponent(fileName)}" target="_blank" rel="noreferrer">预览</a>` : ""}
            ${downloadable ? `<a href="/downloads/${encodeURIComponent(fileName)}?download=1" download>下载文件</a>` : ""}
            ${(task.status === "queued" || task.status === "running") ? `<button class="secondary danger" data-cancel="${task.id}" type="button">取消</button>` : ""}
            <button class="secondary danger" data-delete="${task.id}" type="button">删除</button>
          </div>
          <pre>${escapeHTML((task.logs || []).slice(-12).join("\n"))}</pre>
        `;
        const checkbox = el.querySelector("[data-select]");
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) selected.add(task.id);
          else selected.delete(task.id);
          render(currentTasks);
        });
        const cancel = el.querySelector("[data-cancel]");
        if (cancel) cancel.addEventListener("click", () => cancelTask(task.id));
        const remove = el.querySelector("[data-delete]");
        remove.addEventListener("click", async () => {
          if (!confirm("删除这条任务记录？运行中的任务会被取消。")) return;
          await deleteTask(task.id);
          selected.delete(task.id);
          await loadTasks();
        });
        list.appendChild(el);
      }
    }

    function progressLabel(status) {
      if (status === "queued") return "等待下载";
      if (status === "running") return "下载进度";
      if (status === "succeeded") return "下载完成";
      if (status === "canceled") return "已取消";
      if (status === "failed") return "下载失败";
      return "下载进度";
    }

    function formatTime(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
      }).format(new Date(value));
    }

    function escapeHTML(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    loadTasks();
    setInterval(loadTasks, 2500);
  </script>
</body>
</html>
